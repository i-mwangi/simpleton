name: Build backend image

# SCAFFOLD - manual trigger only. Wire up a container registry before enabling.
#
# The live deployment currently builds the image directly on the ECS VM
# (`git pull` + `docker build`), so no push-to-registry step is needed for the
# demo. This workflow is left in the repo as ready-to-enable scaffolding: once
# a container registry (Alibaba Cloud ACR, Docker Hub, etc.) is wired up, add
# the four secrets below and re-enable the `push` trigger.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   ACR_REGISTRY  - e.g. registry-intl.ap-southeast-1.aliyuncs.com
#   ACR_NAMESPACE - the registry namespace
#   ACR_USERNAME  - the registry credential username
#   ACR_PASSWORD  - the registry credential password (or an access token)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Alibaba Cloud Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/particl-backend:latest
            ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/particl-backend:${{ github.sha }}
